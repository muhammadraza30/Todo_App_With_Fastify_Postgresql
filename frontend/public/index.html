<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <h1>Todo App</h1>

  <!-- Email and Name Form -->
  <form id="user-form" style="display: flex; align-items: center; margin: 20px; width: 500px; justify-content: space-evenly;">
    <input type="email" id="user-email" placeholder="Enter your email" required>
    <button type="submit">Submit</button>
  </form>

  <div id="user-info" style="display: none; align-items: center; margin: 20px; width: 500px; justify-content: space-evenly;"">
    <p>Logged in as: <span id="user-email-display"></span></p>
    <button id="switch-user">Switch User</button>
  </div>
  <!-- Todo App Form -->
  <div style="display: inline-flex; align-items: center; margin: 20px; width: 500px; justify-content: space-evenly;">
    <button id="mark-all">Mark All as Completed</button>
    <button id="delete-account" style="margin-left: 10px;">Delete Account</button>
  </div>

  <form id="todo-form">
    <input type="text" id="todo-input" placeholder="Add a new todo..." required>
    <button type="submit">Add</button>
  </form>
  <ul id="todo-list"></ul>

  <script src="app.js"></script>
</body>

</html>
